name: Feature request
description: Suggest an improvement to the StarLedger template.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is hard or impossible with the template today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This keeps the self-hosted, no-central-service design (your token, your infra, no shared backend).
          required: true
